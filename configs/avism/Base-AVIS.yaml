MODEL:
  BACKBONE:
    FREEZE_AT: 0
    NAME: "build_resnet_backbone"
  WEIGHTS: "detectron2://ImageNetPretrained/torchvision/R-50.pkl"
  PIXEL_MEAN: [123.675, 116.280, 103.530]
  PIXEL_STD: [58.395, 57.120, 57.375]
  MASK_ON: True
  RESNETS:
    DEPTH: 50
    STEM_TYPE: "basic"  # not used
    STEM_OUT_CHANNELS: 64
    STRIDE_IN_1X1: False
    OUT_FEATURES: ["res2", "res3", "res4", "res5"]
    NORM: "FrozenBN"
    # NORM: "SyncBN"
    RES5_MULTI_GRID: [1, 1, 1]  # not used
  AVISM:
    ENC_WINDOW_SIZE: 6
    SIM_WEIGHT: 0.5
    AUDIO_DIM: 128
    USE_CCAF: False
    AGCL_FRAME_WEIGHT: 0.0
    AGCL_INSTANCE_WEIGHT: 0.0
    AGCL_TEMPERATURE: 0.07
    NUM_REGISTERS: 4
DATASETS:
  TRAIN: ("avis_train",)
  TEST: ("avis_test", )
SOLVER:
  IMS_PER_BATCH: 1                  # 1 sample per step to prevent CUDA OOM during first stage decoder
  GRADIENT_ACCUMULATION_STEPS: 2    # Accumulate over 2 steps to maintain effective batch size of 2
  BASE_LR: 0.0001                   # 1e-4 as per paper
  STEPS: (32000, 40000)              # LR drops by 0.1x at 32k and 40k iterations
  MAX_ITER: 48000                   # 48k total iterations (paper spec)
  CHECKPOINT_PERIOD: 5000
  WARMUP_FACTOR: 1.0
  WARMUP_ITERS: 10
  WEIGHT_DECAY: 0.05
  OPTIMIZER: "ADAMW"                # AdamW as per paper
  BACKBONE_MULTIPLIER: 0.1
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_TYPE: "full_model"
    CLIP_VALUE: 0.01
    NORM_TYPE: 2.0
  AMP:
    ENABLED: False                   # DISABLED to match baseline math and prevent accuracy gap
INPUT:
  MIN_SIZE_TRAIN_SAMPLING: "choice_by_clip"
  RANDOM_FLIP: "flip_by_clip"
  MIN_SIZE_TRAIN: (360, 480)
  MIN_SIZE_TEST: 360
  CROP:
    ENABLED: False
    TYPE: "absolute_range"
    SIZE: (600, 720)
  FORMAT: "RGB"
TEST:
  EVAL_PERIOD: 0
DATALOADER:
  FILTER_EMPTY_ANNOTATIONS: False
  NUM_WORKERS: 4
SEED: 3407
VERSION: 2
